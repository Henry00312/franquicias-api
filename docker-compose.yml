services:
  # Servicio MongoDB
  mongodb:
    image: mongo:7.0-alpine
    container_name: franquicias-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: franquicias
    volumes:
      - mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - franquicias-network

  # Servicio de la API
  franquicias-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: franquicias-api
    ports:
      - "8080:8080"
    environment:
      MONGO_USER: admin
      MONGO_PASSWORD: password
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DATABASE: franquicias
      SERVER_PORT: 8080
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/franquicias"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - franquicias-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  franquicias-network:
    driver: bridge
